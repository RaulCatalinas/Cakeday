name: cakeday
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  flutter_themed: ^1.0.0+3
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2
  sqflite: ^2.4.2
  path: ^1.9.1
  fluttertoast: ^9.0.0
  flutter_contacts: ^2.0.0
  calendar_date_picker2: ^2.0.1
  intl: ^0.20.2
  collection: ^1.19.1
  awesome_notifications: ^0.11.0
  flutter_riverpod: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
